name: NUnit3TestAdapter.NuGet.Publish

on:
  workflow_dispatch:

defaults:
  run:
    shell: pwsh
jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest

    steps:
    - name: ⤵Checkout Source
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: 🛠️ Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
      with:
        dotnet-version: |
          8.0.x

    - name: Build
      run: .\build.ps1 -t QuickRelease

    - name: 💾 Upload build artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: Package
        path: package

    - name: Publish nupkg and snupkg to NuGet.org
      run: |
          foreach($file in (Get-ChildItem package -Recurse -Include *.nupkg)) {
              dotnet nuget push $file --api-key "${{ secrets.PUBLISH_NUGET_ORG }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
